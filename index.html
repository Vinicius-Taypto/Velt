<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velt - Invista com Sabedoria</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --cor-primaria: #1E2A38;
            --cor-secundaria: #4A5B78;
            --cor-fundo-claro: #F5F6F8;
            --cor-cinza: #D0D3D8;
            --cor-sucesso: #4CAF50;
            --cor-erro: #D32F2F;
            --cor-texto: #1C1C1E;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: var(--cor-fundo-claro);
            color: var(--cor-texto);
        }

        header {
            background-color: var(--cor-primaria);
            padding: 1rem;
            color: white;
            text-align: center;
        }

        header h1 {
            margin-bottom: 0.5rem;
        }

        header nav {
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        header nav button { 
            background: none;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        header nav a { 
            background: none;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none; 
            padding: 0; 
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 1.5rem;
            background-color: white;
            min-height: 100vh;
        }

        .boas-vindas h2 {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .saldo {
            background-color: #eaf0f5;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
        }

        .saldo h3 {
            font-size: 1rem;
        }

        .saldo span {
            color: var(--cor-sucesso);
            font-weight: bold;
        }

        
    </style>
</head>
<body>
    <div id="mainApp">
        <header>
            <h1>Bem-vindo à Velt</h1>
            <nav>
                <a href="curso.html">Curso</a>
                <a href="simulador.html">Simulador</a>
                <a href="quiz.html">Quiz</a>
                <button onclick="logout()">Sair</button>
            </nav>
        </header>

        <div class="container">
            <div class="boas-vindas">
                <h2>Olá, <span id="userName"></span></h2>
            </div>

            <div class="saldo">
                <h3>Saldo Total: R$ 25.000,00</h3>
                <p><span>+5,00% hoje</span></p>
            </div>

            <p>Seja bem-vindo(a) à Velt! Utilize o menu acima para explorar nossos recursos.</p>

        </div>
    </div>

    <script>
        
        window.onload = function() {
            const savedUser = localStorage.getItem('usuario');
            if (!savedUser) {
                window.location.href = 'login.html';
            } else {
                document.getElementById('userName').innerText = savedUser;
            }
        };

        function logout() {
            localStorage.removeItem('usuario');
            localStorage.removeItem('senha');
            window.location.href = 'login.html'; 
        }
    </script>
</body>
</html>
