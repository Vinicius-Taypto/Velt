<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velt - Simulador</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <style>
        
        :root {
            --cor-primaria: #1E2A38;
            --cor-secundaria: #4A5B78;
            --cor-fundo-claro: #F5F6F8;
            --cor-cinza: #D0D3D8;
            --cor-sucesso: #4CAF50;
            --cor-erro: #D32F2F;
            --cor-texto: #1C1C1E;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: var(--cor-fundo-claro);
            color: var(--cor-texto);
        }

        header {
            background-color: var(--cor-primaria);
            padding: 1rem;
            color: white;
            text-align: center;
        }

        header h1 {
            margin-bottom: 0.5rem;
        }

        header nav {
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        header nav a, header nav button {
            background: none;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 1.5rem;
            background-color: white;
            min-height: 100vh;
        }

        
        .simulador input {
            padding: 0.6rem;
            width: 100%;
            margin-bottom: 0.5rem;
            border-radius: 6px;
            border: 1px solid var(--cor-cinza);
        }

        .simulador button {
            background-color: var(--cor-primaria);
            color: white;
            padding: 0.6rem;
            width: 100%;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Velt - Simulador de Investimentos</h1>
        <nav>
            <a href="index.html">Início</a>
            <a href="curso.html">Curso</a>
            <a href="quiz.html">Quiz</a>
            <button onclick="logout()">Sair</button>
        </nav>
    </header>

    <div class="container">
        <h2>Simulador de Investimentos</h2>
        <input type="number" id="montante" placeholder="Montante Investido (R$)" value="10000">
        <input type="number" id="periodo" placeholder="Período (anos)" value="5">
        <input type="number" id="rentabilidade" placeholder="Rentabilidade (% a.a.)" value="5">
        <button onclick="simularInvestimento()">Simular</button>
        <p id="resultado"></p>
    </div>

    <script>
        function simularInvestimento() {
            const montante = parseFloat(document.getElementById('montante').value);
            const periodo = parseInt(document.getElementById('periodo').value);
            const rentabilidade = parseFloat(document.getElementById('rentabilidade').value) / 100;

            if (isNaN(montante) || isNaN(periodo) || isNaN(rentabilidade)) {
                document.getElementById('resultado').innerText = "Por favor, insira valores válidos.";
                return;
            }

            const resultado = montante * Math.pow(1 + rentabilidade, periodo);
            document.getElementById('resultado').innerText = `Valor final: R$ ${resultado.toFixed(2)}`;
        }

       
        function logout() {
            localStorage.removeItem('usuario');
            localStorage.removeItem('senha');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
