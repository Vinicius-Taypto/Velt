<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velt - Acesso</title>
    <style>
        :root {
            --cor-primaria: #1E2A38;
            --cor-secundaria: #4A5B78;
            --cor-fundo-claro: #F5F6F8;
            --cor-cinza: #D0D3D8;
            --cor-sucesso: #4CAF50;
            --cor-erro: #D32F2F;
            --cor-texto: #1C1C1E;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: var(--cor-fundo-claro);
            color: var(--cor-texto);
        }

        .tela-login {
            background-color: var(--cor-primaria);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            flex-direction: column;
            gap: 1rem;
        }

        .tela-login input, .tela-login button {
            padding: 0.7rem;
            border: none;
            border-radius: 6px;
            width: 250px;
        }

        .tela-login input {
            margin-top: 0.5rem;
        }

        .tela-login button {
            background-color: white;
            color: var(--cor-primaria);
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="loginScreen" class="tela-login">
        <h1>Velt</h1>
        <p>Invista com Sabedoria</p>
        <input type="text" id="novoUsuario" placeholder="Usuário">
        <input type="password" id="novaSenha" placeholder="Senha">
        <button onclick="registrar()">Registrar</button>
        <button onclick="login()">Entrar</button>
    </div>

    <script>
        function registrar() {
            const user = document.getElementById('novoUsuario').value;
            const pass = document.getElementById('novaSenha').value;
            if (user && pass) {
                localStorage.setItem('usuario', user);
                localStorage.setItem('senha', pass);
                alert('Registrado com sucesso! Agora clique em "Entrar".');
            } else {
                alert('Por favor, preencha todos os campos.');
            }
        }

        function login() {
            const user = document.getElementById('novoUsuario').value;
            const pass = document.getElementById('novaSenha').value;
            const savedUser = localStorage.getItem('usuario');
            const savedPass = localStorage.getItem('senha');

            if (user === savedUser && pass === savedPass) {
                window.location.href = 'index.html'; 
            } else {
                alert('Usuário ou senha incorretos.');
            }
        }
    </script>
</body>
</html>
